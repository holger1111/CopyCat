name: CopyCat CI v3.0
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install system dependencies
      run: sudo apt-get install -y python3-tk

    - name: Install pytest + cov
      run: pip install pytest pytest-cov jinja2 watchdog flask pygments reportlab
    
    - name: Run Tests with Coverage  
      run: |
        pytest test_copycat.py -v --cov=. \
          --cov-config=.coveragerc \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: holger1111/CopyCat
        files: ./coverage.xml
        fail_ci_if_error: false

  build-exe:
    runs-on: windows-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install build dependencies
      run: pip install pyinstaller jinja2 watchdog

    - name: Build CopyCat.exe
      run: pyinstaller CopyCat.spec

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: CopyCat-exe
        path: dist/CopyCat.exe
        retention-days: 30

  build-web-exe:
    runs-on: windows-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install build dependencies
      run: pip install pyinstaller flask jinja2 watchdog

    - name: Build CopyCat_Web.exe
      run: pyinstaller CopyCat_Web.spec

    - name: Upload Web-EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: CopyCat-Web-exe
        path: dist/CopyCat_Web.exe
        retention-days: 30

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install build tools
      run: pip install build

    - name: Build sdist + wheel
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
